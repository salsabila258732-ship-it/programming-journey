<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <style>
        div.gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
        }
        div.gallery-item {
            margin: 5px;
            border: 1px solid gray;
            width: 180px;
        }
        div.gallery-item:hover {
            border: 1px solid burlywood;
        }
        div.gallery-item img {
            width: 100%;
            height: auto;
        }
        div.gallery-item .desc {
            padding: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h2>Image Gallery</h2>

    <div class="gallery">

        <div class="gallery-item">
            <a target="_blank" href="img_tebing.jpg.jpeg">
                <img src="img_tebing.jpg.jpeg" alt="Tebing">
            </a>
            <div class="desc">Tebing</div>
        </div>

        <div class="gallery-item">
            <a target="_blank" href="img_forest.jpg.jpeg">
                <img src="img_forest.jpg.jpeg" alt="Forest">
            </a>
            <div class="desc">Forest</div>
        </div>

        <div class="gallery-item">
            <a target="_blank" href="img_mountains.jpg.jpeg">
                <img src="img_mountains.jpg.jpeg" alt="Mountains">
            </a>
            <div class="desc">Mountains</div>
        </div>

        <div class="gallery-item">
            <a target="_blank" href="img_lights.jpg.jpeg">
                <img src="img_lights.jpg.jpeg" alt="Northern Lights">
            </a>
            <div class="desc">Northern Lights</div>
        </div>

    </div>
</body>
</html>

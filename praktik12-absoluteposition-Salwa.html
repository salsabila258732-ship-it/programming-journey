<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absolute Position</title>
    <style>
        div{
            width: 200px;
            height: 200px;
        }
        .satu{
            background-color: crimson;
        }
        .dua{
            background-color: darkorchid;
            position: absolute;
            top: 10px;
            left: 50px;
        }
        .tiga{
            background-color: hotpink;
        }
    </style>
</head>
<body>
    <div class="satu"></div>
    <div class="dua"></div>
    <div class="tiga"></div>
</body>
</html>

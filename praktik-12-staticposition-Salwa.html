<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static Position</title>
    <style>
        div{
            width: 200px;
            height: 200px;
        }
        .satu{
            background-color: cornflowerblue;
        }
        .dua{
            background-color: coral;
            position: static;
        }
        .tiga{
            background-color: lightgreen;
        }
    </style>
</head>
<body>
    <div class="satu"></div>
    <div class="dua"></div>
    <div class="tiga"></div>
</body>
</html>

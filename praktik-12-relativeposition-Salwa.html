<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relative Position</title>
    <style>
        div{
            width: 200px;
            height: 200px;
        }
        .satu{
            background-color: cornflowerblue;
        }
        .dua{
            background-color: fuchsia;
            position: relative;
            top: 10px;
            left: 50px;
        }
        .tiga{
            background-color: palegreen;
        }
    </style>
</head>
<body>
    <div class="satu"></div>
    <div class="dua"></div>
    <div class="tiga"></div>

</body>
</html>

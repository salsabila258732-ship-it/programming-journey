<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Mengubah Warna Style Border Salwa Salsabila</title>
    <style>
        .solid {
            border: 3px solid black;
            padding: 10px;
            margin: 10px;
            text-align: center;
            
        }
        .double {
            border: 3px double blue;
            padding: 10px;
            margin: 10px;
            text-align: center;
        }
        .groove {
            border: 3px groove green;
            padding: 10px;
            margin: 10px;
            text-align: center;
        }
        .ridge {
            border: 3px ridge red;
            padding: 10px;
            margin: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="solid">Salwa Salsabila</div>
    <div class="double">Salwa Salsabila</div>
    <div class="groove">Salwa Salsabila</div>
    <div class="ridge">Salwa Salsabila</div>
</body>
</html>

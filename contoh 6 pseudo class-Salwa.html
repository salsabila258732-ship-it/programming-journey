<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contoh 6 pseudo class</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        /* Gaya dasar menu */
        .menu {
            background-color: lightcoral;
            overflow: hidden;
        }
        .menu a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px;
            text-decoration: none;
            transition: background-color 0.3s;
        }
        /* Efek hover */
        .menu a hover {
            background-color: darksalmon;
            color: white;
        }
    </style>
</head>
<body>
    <h2>Contoh Menu Hover</h2>

    <div class="menu">
        <a href="#">Beranda</a>
        <a href="#">Tentang</a>
        <a href="#">Layanan</a>
        <a href="#">Kontak</a>
    </div>
</body>
</html>

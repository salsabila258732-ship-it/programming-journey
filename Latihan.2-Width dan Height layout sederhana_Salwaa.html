<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan 2 Width dan Height Membuat Layout Sederhana</title>
    <style>
        .header {
            width: 100%;
            height: 100px;
            background-color: lightsalmon;
                }

        .content {
            width: 100%;
            height: 300px;
            background-color: crimson;
                }

        footer {
            width: 100%;
            height: 80px;
            background-color: lightsalmon;
            }
    </style>
</head>
<body>
    <div class="header">Salwa Salsabila</div>
    <div class="contant">Salwa Salsabila</div>
    <footer>
        <p>Copyright  &copy; Salwa Salsabila X PPLG 1 2026</p>
    </footer>
</body>
</html>

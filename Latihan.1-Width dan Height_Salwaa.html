<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan 1 Width dan Weight menggunakan Box</title>
    <style>
        .box1 {
            width: 200px;
            height: 200px;
            background-color: cornflowerblue;
            border: 2px solid blue;
            text-align: center;
        }
        .box2 {
            width: 50%;
            height: 150px;
            background-color: coral;
            border: 2px double crimson;
            text-align: center;
        }
        .box3 {
            width: 80vw;
            height: 30vh;
            background-color: plum;
            border: 2px groove purple;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="box1">Maripossa</div>
    <div class="box2">Maripossa</div>
    <div class="box3">Maripossa</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Float-wrap-left</title>
    <style>
        .container {
            max-width: 800px;
            height: 100px;   
            border: 3px solid;
            margin: auto;
            padding: 10px;
        }
        img {
            width: 100px;
            height: 100px;
            float: left;
            margin-right: 10px; 
        }
        p {
            overflow: hidden;  
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="background.jpeg" alt="gambar background">
        <p>Berikut adalah background gambar matahari terbenam.</p>
    </div>
</body>
</html>
